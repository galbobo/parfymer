<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parfymer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f8;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #333;
    }
    .meta {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
      font-size: 14px;
    }
    #search {
      display: block;
      margin: 0 auto 20px auto;
      width: 80%;
      max-width: 420px;
      padding: 10px 15px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }
    #search:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      justify-items: center;
    }
    .product {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: transform 0.3s;
      background-color: #fff;
      text-align: center;
      width: 100%;
      max-width: 320px;
    }
    .product:hover {
      transform: translateY(-5px);
    }
    .product img {
      width: 100%;
      display: block;
      border-radius: 8px;
      transition: transform 0.3s;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      background: #eee;
    }
    .product:hover img {
      transform: scale(1.05);
    }
    .product-link {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100% - 44px);
      text-decoration: none;
    }
    .overlay {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
      background-color: rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 10px;
    }
    .product-link:hover .overlay {
      opacity: 1;
    }
    .product-title {
      display: block;
      padding: 10px 10px 12px 10px;
      font-weight: bold;
      color: #1a73e8;
      text-decoration: none;
      line-height: 1.25;
      min-height: 44px;
    }
    .product-title:hover {
      color: #0b53c1;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <h1>Parfymer</h1>
  <div class="meta"><span id="countText">Laster …</span></div>

  <input
    type="text"
    id="search"
    onkeyup="filterProducts()"
    placeholder="Søk etter produktnavn…"
    aria-label="Søk etter produktnavn"
  />

  <div class="grid" id="productGrid"></div>

  <script>
    // 1) Lim inn Fragrantica-lenker her (én per linje). Du har allerede gjort dette:
    const fragranticaUrlsRaw = `
https://www.fragrantica.com/perfume/French-Avenue/Vulcan-Feu-105520.html
https://www.fragrantica.com/perfume/Azzaro/The-Most-Wanted-Parfum-73664.html
https://www.fragrantica.com/perfume/Chanel/Allure-Homme-Sport-Eau-Extreme-14669.html
https://www.fragrantica.com/perfume/Parfums-de-Marly/Percival-51037.html
https://www.fragrantica.com/perfume/Parfums-de-Marly/Sedley-56273.html
https://www.fragrantica.com/perfume/Chanel/Bleu-de-Chanel-Eau-de-Parfum-25967.html
https://www.fragrantica.com/perfume/Rabanne/Invictus-Parfum-90433.html
https://www.fragrantica.com/perfume/Giorgio-Armani/Armani-Code-Parfum-75126.html
https://www.fragrantica.com/perfume/Jean-Paul-Gaultier/Le-Beau-Paradise-Garden-88836.html
https://www.fragrantica.com/perfume/Versace/Versace-Pour-Homme-Dylan-Blue-40031.html
https://www.fragrantica.com/perfume/Jean-Paul-Gaultier/Le-Male-Le-Parfum-61856.html
https://www.fragrantica.com/perfume/Armaf/Odyssey-Spectra-98692.html
https://www.fragrantica.com/perfume/Valentino/Valentino-Uomo-Born-In-Roma-Coral-Fantasy-71761.html
https://www.fragrantica.com/perfume/Prada/Prada-L-Homme-39029.html
https://www.fragrantica.com/perfume/Versace/Versace-Pour-Homme-2318.html
https://www.fragrantica.com/perfume/Armaf/Club-de-Nuit-Precieux-I-93272.html
https://www.fragrantica.com/perfume/Giorgio-Armani/Acqua-di-Gio-Parfum-81508.html
https://www.fragrantica.com/perfume/French-Avenue/Aether-94702.html
https://www.fragrantica.com/perfume/Lattafa-Perfumes/Ishq-Al-Shuyukh-Silver-81099.html
https://www.fragrantica.com/perfume/French-Avenue/Liquid-Brun-94713.html
https://www.fragrantica.com/perfume/Chanel/Allure-Homme-Edition-Blanche-Eau-de-Parfum-28942.html
https://www.fragrantica.com/perfume/Creed/Green-Irish-Tweed-474.html
https://www.fragrantica.com/perfume/Xerjoff/XJ-1861-Renaissance-12126.html
https://www.fragrantica.com/perfume/Xerjoff/XJ-1861-Naxos-30529.html
https://www.fragrantica.com/perfume/Jean-Paul-Gaultier/Ultra-Male-30947.html
https://www.fragrantica.com/perfume/Parfums-de-Marly/Layton-39314.html
https://www.fragrantica.com/perfume/Nishane/Hacivat-44174.html
https://www.fragrantica.com/perfume/Prada/Prada-L-Homme-Intense-45396.html
https://www.fragrantica.com/perfume/Montblanc/Explorer-52002.html
https://www.fragrantica.com/perfume/Giorgio-Armani/Emporio-Armani-Stronger-With-You-Intensely-52802.html
https://www.fragrantica.com/perfume/Versace/Eros-Eau-de-Parfum-62762.html
https://www.fragrantica.com/perfume/Yves-Saint-Laurent/Y-Le-Parfum-64718.html
https://www.fragrantica.com/perfume/Initio-Parfums-Prives/Paragon-76580.html
https://www.fragrantica.com/perfume/Creed/Absolu-Aventus-2023-84112.html
https://www.fragrantica.com/perfume/Yves-Saint-Laurent/MYSLF-Le-Parfum-94983.html
https://www.fragrantica.com/perfume/Hugo-Boss/Bottled-Absolu-96246.html
https://www.fragrantica.com/perfume/French-Avenue/Moonstone-Bleu-100011.html
https://www.fragrantica.com/perfume/Aromatix-X-French-Avenue/Platine-Blanc-106068.html
https://www.fragrantica.com/perfume/French-Avenue/Capricorn-107908.html
https://www.fragrantica.com/perfume/Aromatix-X-French-Avenue/Sun-Kissed-117530.html
https://www.fragrantica.com/perfume/Aromatix-X-French-Avenue/Forbidden-Fruit-117531.html
https://www.fragrantica.com/perfume/Aromatix-X-French-Avenue/Teas-Me-117532.html
https://www.fragrantica.com/perfume/French-Avenue/Iris-Patchouli-118018.html
https://www.fragrantica.com/perfume/Rayhaan/Aquatica-120605.html
`.trim();

    function titleCaseFromSlug(slug) {
      // Gjør "Acqua-di-Gio-Parfum" -> "Acqua di Gio Parfum"
      // Bevarer store bokstaver i akronymer i praksis (URL-er er ofte allerede "Title Case").
      return slug.replace(/-/g, " ").replace(/\s+/g, " ").trim();
    }

    function parseFragranticaUrl(url) {
      // Forventer: https://www.fragrantica.com/perfume/BRAND/SLUG-ID.html
      const m = url.match(/\/perfume\/([^/]+)\/([^/]+)\.html$/i);
      if (!m) return null;

      const brandSlug = m[1];
      const slugAndId = m[2];

      const idMatch = slugAndId.match(/-(\d+)$/);
      const id = idMatch ? idMatch[1] : null;

      const perfumeSlug = id ? slugAndId.slice(0, -(id.length + 1)) : slugAndId;

      const brand = titleCaseFromSlug(brandSlug);
      const perfume = titleCaseFromSlug(perfumeSlug);

      const title = `${brand} – ${perfume}`;
      const image = id
        ? `https://fimgs.net/mdimg/perfume-thumbs/375x500.${id}.2x.avif`
        : null;

      return { url, id, brand, perfume, title, image };
    }

    const products = fragranticaUrlsRaw
      .split("\n")
      .map(s => s.trim())
      .filter(Boolean)
      .map(parseFragranticaUrl)
      .filter(Boolean)
      .sort((a, b) => a.title.localeCompare(b.title, "no"));

    const grid = document.getElementById("productGrid");
    const countText = document.getElementById("countText");

    function renderProducts(list) {
      grid.innerHTML = "";
      for (const p of list) {
        const div = document.createElement("div");
        div.className = "product";
        div.innerHTML = `
          <img src="${p.image ?? ""}" alt="${escapeHtml(p.title)}" loading="lazy">
          <a href="${p.url}" class="product-link" target="_blank" rel="noopener">
            <div class="overlay">Se produkt</div>
          </a>
          <a href="${p.url}" class="product-title" target="_blank" rel="noopener">
            ${escapeHtml(p.title)}
          </a>
        `;
        grid.appendChild(div);
      }
      countText.textContent = `${list.length} av ${products.length} parfymer vises`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function filterProducts() {
      const input = document.getElementById("search").value.toLowerCase();
      const filtered = products.filter(p => p.title.toLowerCase().includes(input));
      renderProducts(filtered);
    }

    // Init
    renderProducts(products);
  </script>
</body>
</html>
